<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>取付管検査 QR閲覧デモ ｜ 現場一覧</title>
<style>
  :root{
    --bg:#0e1620; --panel:#16212e; --panel2:#1c2a3a; --ink:#eef3f8; --muted:#8ea3b8;
    --line:#2a3a4d; --accent:#46c6d6; --demo:#e2574c;
    --mono:ui-monospace,"SFMono-Regular",Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,"Segoe UI","Noto Sans JP",sans-serif;
  }
  *{box-sizing:border-box}
  body{margin:0; background:radial-gradient(1200px 500px at 50% -10%,#17273a,transparent 60%),var(--bg);
    color:var(--ink); font-family:var(--sans); line-height:1.55; padding-bottom:48px}
  .wrap{max-width:560px; margin:0 auto; padding:0 18px}
  .demobar{background:var(--demo); color:#fff; font-family:var(--mono); font-size:12.5px;
    letter-spacing:.05em; font-weight:600; text-align:center; padding:7px 10px}
  header{padding:34px 0 6px}
  .eyebrow{font-family:var(--mono); font-size:11.5px; letter-spacing:.22em; color:var(--accent);
    text-transform:uppercase; margin:0 0 10px}
  h1{font-size:23px; margin:0 0 8px; letter-spacing:.01em}
  .lead{font-size:14px; color:var(--muted); margin:0}
  .section-label{font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--muted);
    text-transform:uppercase; margin:30px 2px 12px; display:flex; align-items:center; gap:10px}
  .section-label::after{content:""; flex:1; height:1px; background:var(--line)}
  .site{display:flex; align-items:center; gap:15px; text-decoration:none; color:var(--ink);
    background:linear-gradient(180deg,var(--panel2),var(--panel)); border:1px solid var(--line);
    border-radius:14px; padding:16px; transition:border-color .15s ease}
  @media(hover:hover){.site:hover{border-color:var(--accent)}}
  .site .tag{font-family:var(--mono); font-size:12px; color:var(--accent); background:#0f1a25;
    border:1px solid var(--line); border-radius:8px; padding:8px 10px}
  .site h3{margin:0 0 2px; font-size:16px}
  .site p{margin:0; font-size:12.5px; color:var(--muted)}
  .site .go{margin-left:auto; color:var(--accent); font-family:var(--mono); font-size:20px; opacity:.8}
  .note{margin-top:26px; border:1px solid var(--line); border-radius:12px; padding:16px 16px;
    background:#111b26; font-size:13px; color:var(--muted); line-height:1.7}
  .note b{color:var(--ink); font-weight:600}
  code{font-family:var(--mono); font-size:12px; color:var(--accent); background:#0f1a25;
    padding:1px 5px; border-radius:4px}
</style>
</head>
<body>
  <div class="demobar">サンプルデータ ／ 展示・社内イメージ共有デモ</div>
  <div class="wrap">
    <header>
      <p class="eyebrow">Mapping Camera ／ QR Viewer</p>
      <h1>取付管検査 QR閲覧デモ</h1>
      <p class="lead">蓋の裏のQRコードを読み込むと、その取付管の検査報告書・映像・写真集が開きます。</p>
    </header>

    <p class="section-label">現場一覧</p>
    <a class="site" href="sites/DEMO001/index.html">
      <span class="tag">DEMO001</span>
      <div>
        <h3>展示用サンプル配管</h3>
        <p>報告書 / 映像 / コメント写真集</p>
      </div>
      <span class="go">→</span>
    </a>

    <div class="note">
      <b>使い方</b><br>
      新しい現場を追加するときは <code>sites/</code> の下に <code>DEMO001</code> と同じ構成のフォルダを作り、
      <code>report.pdf</code>・<code>video.mp4</code>・<code>photos.xlsx</code>・写真を差し替えます。
      QRコードは各現場ページを開くと自動生成されます（公開後のURLで表示）。
    </div>
  </div>
</body>
</html>
